<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adoções - Admin | PETMEL ADOÇÕES</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/style-admin.css">
</head>
<body>
  <nav id="navbar" class="navbar"></nav>
  <div id="alert-container"></div>

  <main class="container" style="padding-top:40px;padding-bottom:60px">

    <div class="admin-page-header">
      <h2>Solicitações de Adoção</h2>
      <a href="/admin/index.html" class="btn btn-secondary">← Dashboard</a>
    </div>

    <!-- Filtros -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="filterAdoptions('all')">Todas</button>
      <button class="filter-btn" data-filter="pending" onclick="filterAdoptions('pending')">Pendentes</button>
      <button class="filter-btn" data-filter="approved" onclick="filterAdoptions('approved')">Aprovadas</button>
      <button class="filter-btn" data-filter="rejected" onclick="filterAdoptions('rejected')">Rejeitadas</button>
    </div>

    <div class="table-container">
      <div id="admin-adoptions">
        <p style="text-align:center;padding:40px;color:#64748b">Carregando...</p>
      </div>
    </div>

  </main>

  <footer>
    <p style="text-align:center;padding:20px">&copy; 2026 PETMEL ADOÇÕES</p>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
