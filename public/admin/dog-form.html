<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Cão - Admin | PETMEL ADOÇÕES</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/style-admin.css">
</head>
<body>
  <nav id="navbar" class="navbar"></nav>
  <div id="alert-container"></div>

  <main class="container" style="padding-top:40px;padding-bottom:60px">

    <div class="admin-page-header" style="max-width:660px;margin-left:auto;margin-right:auto">
      <h2 id="form-title">Cadastrar Novo Cão</h2>
      <a href="/admin/dogs.html" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="form-container">
      <form id="dog-form">
        <div class="form-group">
          <label for="name">Nome:</label>
          <input type="text" id="name" name="name" required placeholder="Nome do cão">
        </div>

        <div class="form-group">
          <label for="age">Idade:</label>
          <input type="text" id="age" name="age" placeholder="Ex: 2 anos" required>
        </div>

        <div class="form-group">
          <label for="vaccines">Vacinas:</label>
          <textarea id="vaccines" name="vaccines" placeholder="Lista de vacinas tomadas"></textarea>
        </div>

        <div class="form-group">
          <label for="condition">Condição / Doenças:</label>
          <input type="text" id="condition" name="condition" placeholder="Ex: Saudável, Deficiente visual, etc.">
        </div>

        <div class="form-group">
          <label for="description">Descrição:</label>
          <textarea id="description" name="description" placeholder="Conte um pouco sobre o cão..."></textarea>
        </div>

        <div class="form-group">
          <label for="photo">Foto:</label>
          <input type="file" id="photo" name="photo" accept="image/*">
          <img id="photo-preview" class="img-preview" style="display:none">
        </div>

        <div class="form-group" id="available-group" style="display:none">
          <label for="available">Disponível para adoção:</label>
          <select id="available" name="available">
            <option value="1">Sim</option>
            <option value="0">Não</option>
          </select>
        </div>

        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="submit" class="btn btn-primary" style="flex:1">Salvar</button>
          <a href="/admin/dogs.html" class="btn btn-secondary" style="flex:1;text-align:center">Cancelar</a>
        </div>
      </form>
    </div>

  </main>

  <footer>
    <p style="text-align:center;padding:20px">&copy; 2026 PETMEL ADOÇÕES</p>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
