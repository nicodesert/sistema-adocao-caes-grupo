<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Cães - Admin | PETMEL ADOÇÕES</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/style-admin.css">
</head>
<body>
  <nav id="navbar" class="navbar"></nav>
  <div id="alert-container"></div>

  <main class="container" style="padding-top:40px;padding-bottom:60px">

    <div class="admin-page-header">
      <h2>Gerenciar Cães</h2>
      <div style="display:flex;gap:10px">
        <a href="/admin" class="btn btn-secondary">← Dashboard</a>
        <a href="/admin/caes/novo" class="btn btn-primary">+ Adicionar Cão</a>
      </div>
    </div>

    <!-- Barra de busca admin -->
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <div style="position:relative;flex:1;min-width:200px">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none">🔍</span>
        <input
          type="text"
          id="admin-search-input"
          placeholder="Buscar por nome, idade ou condição..."
          autocomplete="off"
          style="width:100%;padding:10px 36px 10px 38px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;outline:none;transition:border-color 0.2s"
          onfocus="this.style.borderColor='#1d4ed8';this.style.boxShadow='0 0 0 3px rgba(29,78,216,0.12)'"
          onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'"
        >
        <button
          id="admin-search-clear"
          onclick="clearAdminSearch()"
          style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:#64748b;padding:2px 6px"
          title="Limpar busca"
        >✕</button>
      </div>
      <select
        id="admin-filter-status"
        style="padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;background:#fff;color:#1e293b;cursor:pointer;outline:none"
        onchange="applyAdminSearch()"
      >
        <option value="all">Todos os status</option>
        <option value="available">Disponíveis</option>
        <option value="unavailable">Adotados</option>
      </select>
    </div>

    <!-- Contador -->
    <p id="admin-search-count" style="margin-bottom:12px;font-size:0.85rem;color:#64748b;display:none"></p>

    <div class="table-container">
      <div id="admin-dogs">
        <p style="text-align:center;padding:40px;color:#64748b">Carregando...</p>
      </div>
    </div>

  </main>

  <footer>
    <p style="text-align:center;padding:20px">&copy; 2026 PETMEL ADOÇÕES</p>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
