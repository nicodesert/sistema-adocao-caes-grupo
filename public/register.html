<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Adote um Cão</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="navbar" class="navbar"></nav>
  <div id="alert-container"></div>

  <main class="container-small">
    <div class="form-container">
      <h2 class="text-center mb-20">Criar Conta</h2>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Nome Completo:</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Telefone:</label>
          <input type="text" id="phone" name="phone" placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-group">
          <label for="cpf">CPF:</label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
        </div>

        <div class="form-group">
          <label for="address">Endereço:</label>
          <input type="text" id="address" name="address" required>
        </div>

        <div class="form-group">
          <label for="password">Senha:</label>
          <input type="password" id="password" name="password" minlength="6" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Senha:</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">Cadastrar</button>
      </form>

      <p class="text-center mt-20">
        Já tem conta? <a href="/login.html">Faça login</a>
      </p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Abrigo Patinhas Felizes</p>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
